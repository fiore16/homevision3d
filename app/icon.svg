<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- White background -->
  <rect width="32" height="32" rx="4" fill="white"/>

  <!-- Top face -->
  <polygon points="16,3 28,9 16,15 4,9" fill="#00C864"/>

  <!-- Left face -->
  <polygon points="4,9 16,15 16,28 4,22" fill="#00A050"/>

  <!-- Right face -->
  <polygon points="16,15 28,9 28,22 16,28" fill="#008040"/>

  <!-- White dividing lines -->
  <line x1="16" y1="3" x2="16" y2="15" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="15" x2="4" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="15" x2="28" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="15" x2="16" y2="28" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
