  <line x1="16" y1="15" x2="4"  y2="9"  stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="15" x2="28" y2="9"  stroke="white" stroke-width="1.8" stroke-linecap="round"/>
